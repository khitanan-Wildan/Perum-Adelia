<!DOCTYPE html>
<html lang="id">
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>PERUMAHAN ADELIA</title> 
    <script src="https://cdn.tailwindcss.com"></script> 
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script> 
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script> 
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <style>
        .marquee-container {
            display: flex;
            overflow: hidden;
            white-space: nowrap;
            flex: 1;
            min-width: 0;
            margin-right: 12px;
        }
        .marquee-content {
            animation: marquee 12s linear infinite;
            padding-left: 100%;
            display: inline-block;
        }
        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 antialiased select-none"> 
    <div id="root"></div>

<script type="text/babel"> 
const { useState, useEffect, useMemo, useRef } = React;

// ==========================================
// PENGATURAN AKUN ADMIN
// ==========================================
const ADMIN_ACCOUNTS = [
    { username: 'admin1', password: '123' },
    { username: 'admin2', password: '456' }
];

// 1. KONFIGURASI FIREBASE ANDA
const firebaseConfig = {
  apiKey: "AIzaSyDAf69gpgH3I9pPUMXbuLBvPx-ig-pXuvI",
  authDomain: "perum-adelia.firebaseapp.com",
  databaseURL: "https://perum-adelia-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "perum-adelia",
  storageBucket: "perum-adelia.firebasestorage.app",
  messagingSenderId: "453146639381",
  appId: "1:453146639381:web:78774adddc9864c387a21c",
  measurementId: "G-PY2ZP4ECFB"
};

// 2. INISIALISASI FIREBASE
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// URL WEB APP DARI GOOGLE SCRIPT ANDA
const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbzGaZVTQoNML2G2Gi3gq4LgAtp20F-0rAVZDH5Xjz4MMym-0GqGxBSBAdRJhlc_FeiTYw/exec";

const CATEGORIES = { 
    kas_rt: { name: 'Uang Kas', amount: 50000, color: 'bg-blue-50 text-blue-800 border-blue-200' }
};

const MONTH_NAMES = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
const AVAILABLE_YEARS = [2024, 2025, 2026, 2027, 2028, 2029, 2030];

function App() { 
    // --- STATE LOGIN ADMIN ---
    const [adminUser, setAdminUser] = useState(localStorage.getItem('adminUserAdelia') || null);
    const isAdmin = !!adminUser;

    const [showLoginModal, setShowLoginModal] = useState(false);
    const [loginError, setLoginError] = useState('');

    const [activeTab, setActiveTab] = useState('home'); 
    const [activeMonth, setActiveMonth] = useState(new Date().getMonth()); 
    const [activeYear, setActiveYear] = useState(new Date().getFullYear()); 
    const [searchTerm, setSearchTerm] = useState('');
    const [filterStatus, setFilterStatus] = useState('all');
    
    const [filterTransMonth, setFilterTransMonth] = useState(new Date().getMonth().toString());
    const [filterTransYear, setFilterTransYear] = useState(new Date().getFullYear().toString());
    const [filterType, setFilterType] = useState('all');
    const [filterCategory, setFilterCategory] = useState('all');
    const [filterMethod, setFilterMethod] = useState('all');
    
    const [citizens, setCitizens] = useState([]); 
    const [transactions, setTransactions] = useState([]); 
    const [isSyncing, setIsSyncing] = useState(false);
    
    const [showPayModal, setShowPayModal] = useState({ isOpen: false, citizen: null }); 
    const [payNominal, setPayNominal] = useState(50000); 

    const [showTransModal, setShowTransModal] = useState(false); 
    const [editTransData, setEditTransData] = useState(null); 

    const localToday = useMemo(() => {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
    }, []);

    // --- FUNGSI LOGIN / LOGOUT ---
    const handleLogin = (e) => {
        e.preventDefault();
        const u = e.target.username.value;
        const p = e.target.password.value;
        
        const isValid = ADMIN_ACCOUNTS.some(acc => acc.username === u && acc.password === p);
        
        if (isValid) {
            setAdminUser(u);
            localStorage.setItem('adminUserAdelia', u);
            setShowLoginModal(false);
            setLoginError('');
        } else {
            setLoginError('Username atau password salah!');
        }
    };

    const handleLogout = () => {
        if(window.confirm("Yakin ingin keluar dari mode Admin?")) {
            setAdminUser(null);
            localStorage.removeItem('adminUserAdelia');
        }
    };

    // 3. EFEK SINKRONISASI REAL-TIME DENGAN FIREBASE
    useEffect(() => { 
        const citizensRef = database.ref('citizens');
        const transactionsRef = database.ref('transactions');

        citizensRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) setCitizens(Object.values(data));
            else setCitizens([]); 
        });

        transactionsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const transList = Object.values(data);
                transList.sort((a, b) => new Date(b.date) - new Date(a.date));
                setTransactions(transList);
            } else {
                setTransactions([]);
            }
        });

        return () => {
            citizensRef.off();
            transactionsRef.off();
        };
    }, []);

    const formatRupiah = (val) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(val);

    const financialData = useMemo(() => { 
        let cash = 0, qris = 0, income = 0, expense = 0; 
        let allTimeIncome = 0, allTimeExpense = 0;
        let catBalances = Object.keys(CATEGORIES).reduce((acc, k) => ({ ...acc, [k]: 0 }), {});

        transactions.forEach(t => { 
            const nom = parseInt(t.nominal) || 0; 
            const d = new Date(t.date); 
            const isCurrentMonth = d.getMonth() === activeMonth && d.getFullYear() === activeYear;

            if (t.type === 'masuk') { 
                allTimeIncome += nom;
                if (t.method === 'tunai') cash += nom; else qris += nom; 
                if (isCurrentMonth) income += nom; 
                if (t.isDues) { 
                    catBalances['kas_rt'] += nom; 
                } else if (t.category && catBalances[t.category] !== undefined) { 
                    catBalances[t.category] += nom; 
                } 
            } else { 
                allTimeExpense += nom;
                if (t.method === 'tunai') cash -= nom; else qris -= nom; 
                if (isCurrentMonth) expense += nom; 
                if (t.category && catBalances[t.category] !== undefined) { 
                    catBalances[t.category] -= nom; 
                } 
            } 
        }); 
        return { cash, qris, income, expense, allTimeIncome, allTimeExpense, catBalances, total: cash + qris }; 
    }, [transactions, activeMonth, activeYear]);

    const getDuesTotalPaid = (cId) => {
        return transactions.filter(t => {
            if (!t.isDues || t.citizenId !== cId) return false;
            if (t.duesMonth !== undefined && t.duesYear !== undefined) {
                return t.duesMonth === activeMonth && t.duesYear === activeYear;
            }
            return new Date(t.date).getMonth() === activeMonth && new Date(t.date).getFullYear() === activeYear;
        }).reduce((sum, t) => sum + (parseInt(t.nominal) || 0), 0);
    };

    const isPaid = (cId) => getDuesTotalPaid(cId) >= 25000;

    const duesProgress = useMemo(() => {
        const total = citizens.length;
        const paid = citizens.filter(c => isPaid(c.id)).length;
        const percent = total > 0 ? Math.round((paid / total) * 100) : 0;
        return { total, paid, percent };
    }, [citizens, transactions, activeMonth, activeYear]);

    const handlePayDues = (method, nominal) => { 
        if(!isAdmin) return;
        const c = showPayModal.citizen; 
        const newId = Date.now();
        
        const ketText = nominal === 25000 
            ? `Iuran ${MONTH_NAMES[activeMonth]} (Keamanan) - ${c.name}` 
            : `Iuran ${MONTH_NAMES[activeMonth]} (Keamanan+Sampah) - ${c.name}`;

        const newT = { 
            id: newId, 
            ket: ketText, 
            nominal: nominal, 
            category: 'kas_rt', 
            method, 
            type: 'masuk', 
            date: new Date().toISOString(), 
            citizenId: c.id, 
            isDues: true,
            duesMonth: activeMonth, 
            duesYear: activeYear,
            createdBy: adminUser // Menyimpan info admin yang menginput
        }; 
        
        database.ref('transactions/' + newId).set(newT);
        setShowPayModal({ isOpen: false, citizen: null }); 
        setPayNominal(50000); 
    };

    const handleSaveTransaction = (e) => { 
        e.preventDefault(); 
        if(!isAdmin) return;
        const form = e.target; 
        const [y, m, d] = form.date.value.split('-');
        
        const now = new Date();
        const transactionDate = new Date(y, m - 1, d, now.getHours(), now.getMinutes(), now.getSeconds());

        const newTData = { 
            ket: form.ket.value, 
            nominal: parseInt(form.nom.value), 
            method: form.method.value, 
            type: form.type.value, 
            category: form.cat.value, 
            date: transactionDate.toISOString(), 
        }; 

        if (editTransData) {
            database.ref('transactions/' + editTransData.id).update(newTData);
        } else {
            const newId = Date.now();
            database.ref('transactions/' + newId).set({ id: newId, isDues: false, createdBy: adminUser, ...newTData });
        }
        
        setShowTransModal(false); 
        setEditTransData(null);
    };

    const handleEditCitizen = (citizen) => {
        if(!isAdmin) return;
        const newName = prompt("Ubah Nama Warga:", citizen.name);
        if (newName === null) return; 
        
        const newBlock = prompt("Ubah Blok Rumah:", citizen.block);
        if (newBlock === null) return; 

        if (newName.trim() && newBlock.trim()) {
            database.ref('citizens/' + citizen.id).update({ 
                name: newName.trim(), 
                block: newBlock.trim() 
            });

            transactions.forEach(t => {
                if (t.isDues && t.citizenId === citizen.id) {
                    database.ref('transactions/' + t.id).update({
                        ket: `${t.ket.substring(0, t.ket.lastIndexOf('-'))}- ${newName.trim()}`
                    });
                }
            });
        }
    };

    const handleDeleteCitizen = (id) => {
        if(!isAdmin) return;
        if(window.confirm("Apakah Anda yakin ingin menghapus data warga ini?")) {
            database.ref('citizens/' + id).remove();
        }
    };

    const handleDeleteTransaction = (id) => {
        if(!isAdmin) return;
        if(window.confirm("Apakah Anda yakin ingin menghapus riwayat transaksi ini?")) {
            database.ref('transactions/' + id).remove();
        }
    };

    const handleAddCitizen = () => {
        if(!isAdmin) return;
        const name = prompt("Nama Warga"); 
        const block = prompt("Blok"); 
        if(name && block) {
            const newId = Date.now();
            database.ref('citizens/' + newId).set({
                id: newId,
                name: name.trim(),
                block: block.trim(),
                createdBy: adminUser // Menyimpan info admin yang menginput warga
            });
        }
    };

    const handleSyncToSheets = () => {
        if(!isAdmin) return;
        if(!window.confirm("Kirim seluruh data riwayat transaksi ini ke Google Sheets? (Data di file Sheets akan diperbarui)")) return;
        
        setIsSyncing(true);

        const dataToSend = transactions.map(t => ({
            date: t.date.split('T')[0],
            ket: t.ket,
            type: t.type === 'masuk' ? 'Pemasukan' : 'Pengeluaran',
            cat: CATEGORIES[t.category]?.name || 'Lainnya',
            method: t.method.toUpperCase(),
            nom: t.nominal
        }));

        fetch(GOOGLE_SHEET_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(dataToSend)
        })
        .then(() => {
            alert("Selesai! Data berhasil dikirim ke Google Sheets.");
            setIsSyncing(false);
        })
        .catch(err => {
            alert("Terjadi kesalahan: " + err.message);
            setIsSyncing(false);
        });
    };

    const filteredCitizens = useMemo(() => {
        return citizens.filter(c => {
            const matchesSearch = c.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                  c.block.toLowerCase().includes(searchTerm.toLowerCase());
            
            let matchesStatus = true;
            const paidAmount = getDuesTotalPaid(c.id);
            if (filterStatus === 'lunas') {
                matchesStatus = paidAmount >= 25000;
            } else if (filterStatus === 'belum') {
                matchesStatus = paidAmount < 25000;
            }
            
            return matchesSearch && matchesStatus;
        });
    }, [citizens, searchTerm, filterStatus, transactions, activeMonth, activeYear]);

    const filteredTransactions = useMemo(() => {
        return transactions.filter(t => {
            const tDate = new Date(t.date);
            
            const matchMonth = filterTransMonth === 'all' || tDate.getMonth() === parseInt(filterTransMonth);
            const matchYear = filterTransYear === 'all' || tDate.getFullYear() === parseInt(filterTransYear);
            const matchType = filterType === 'all' || t.type === filterType;
            const matchMethod = filterMethod === 'all' || t.method === filterMethod;
            
            let currentCat = t.category;
            if (t.isDues) {
                const duesMethodCat = t.method === 'tunai' ? 'iuran_tunai' : 'iuran_qris';
                return matchMonth && matchYear && matchType && matchMethod && (filterCategory === 'all' || duesMethodCat === filterCategory || currentCat === filterCategory);
            }
            return matchMonth && matchYear && matchType && matchMethod && (filterCategory === 'all' || currentCat === filterCategory);
        });
    }, [transactions, filterTransMonth, filterTransYear, filterType, filterCategory, filterMethod]);


    return ( 
        <div className="max-w-md mx-auto h-screen flex flex-col bg-gray-50 shadow-xl border-x border-gray-200 relative"> 

            <header className="bg-blue-800 text-white p-3 shadow-md flex-none flex justify-between items-center sticky top-0 z-50"> 
                
                {/* HEADER TEKS BERJALAN (MARQUEE) */}
                <div className="marquee-container">
                    <h1 className="marquee-content text-xs font-bold tracking-wider uppercase">
                        Green Adelia Residance RT 70 RW 02
                    </h1> 
                </div>

                <div className="flex items-center gap-2 flex-none">
                    <span className="text-[10px] bg-blue-700 px-2 py-0.5 rounded font-mono flex items-center shadow-inner">
                        <span className="inline-block w-1.5 h-1.5 bg-green-400 rounded-full mr-1.5 animate-pulse"></span>
                        {MONTH_NAMES[activeMonth].substring(0,3)} {activeYear}
                    </span>
                    
                    {isAdmin ? (
                        <button onClick={handleLogout} className="text-[10px] bg-red-500 hover:bg-red-600 px-2 py-1 rounded shadow-sm">Logout ({adminUser})</button>
                    ) : (
                        <button onClick={() => setShowLoginModal(true)} className="text-[10px] bg-blue-600 hover:bg-blue-500 border border-blue-400 px-2 py-1 rounded shadow-sm">Login</button>
                    )}
                </div>
            </header>

            <main className="flex-1 p-2.5 pb-16 overflow-y-auto"> 
                
                {activeTab === 'home' && ( 
                    <div className="flex flex-col space-y-1.5"> 
                        <div className="grid grid-cols-2 gap-1.5 bg-white p-1 rounded-xl border shadow-sm">
                            <div className="flex flex-col gap-0.5">
                                <label className="text-[8px] font-bold text-gray-400 uppercase px-1">Pilih Bulan</label>
                                <select value={activeMonth} onChange={(e) => setActiveMonth(parseInt(e.target.value))} className="text-[11px] p-1 border border-gray-100 rounded-lg bg-gray-50 font-bold text-gray-700">
                                    {MONTH_NAMES.map((name, idx) => <option key={idx} value={idx}>{name}</option>)}
                                </select>
                            </div>
                            <div className="flex flex-col gap-0.5">
                                <label className="text-[8px] font-bold text-gray-400 uppercase px-1">Pilih Tahun</label>
                                <select value={activeYear} onChange={(e) => setActiveYear(parseInt(e.target.value))} className="text-[11px] p-1 border border-gray-100 rounded-lg bg-gray-50 font-bold text-gray-700">
                                    {AVAILABLE_YEARS.map(yr => <option key={yr} value={yr}>{yr}</option>)}
                                </select>
                            </div>
                        </div>

                        <div className="bg-gradient-to-br from-blue-700 to-blue-900 p-3 rounded-xl text-white shadow-lg space-y-1.5"> 
                            <div>
                                <p className="text-blue-200 text-[9px] font-medium">Total Kas Keseluruhan</p> 
                                <p className="text-xl font-bold tracking-tight">{formatRupiah(financialData.total)}</p> 
                            </div>
                            
                            <div className="grid grid-cols-2 gap-2 pt-1 border-t border-blue-600/30 text-[10px]"> 
                                <div><p className="text-[8px] text-blue-300 uppercase tracking-wider">Tunai</p><p className="font-semibold truncate">{formatRupiah(financialData.cash)}</p></div> 
                                <div><p className="text-[8px] text-blue-300 uppercase tracking-wider">QRIS</p><p className="font-semibold truncate">{formatRupiah(financialData.qris)}</p></div> 
                            </div> 

                            <div className="grid grid-cols-2 gap-2 pt-1 border-t border-blue-600/30 text-[10px]"> 
                                <div><p className="text-[8px] text-emerald-300 uppercase tracking-wider font-bold">Total Masuk (Semua)</p><p className="font-bold text-emerald-200 truncate">{formatRupiah(financialData.allTimeIncome)}</p></div> 
                                <div><p className="text-[8px] text-rose-300 uppercase tracking-wider font-bold">Total Keluar (Semua)</p><p className="font-bold text-rose-200 truncate">{formatRupiah(financialData.allTimeExpense)}</p></div> 
                            </div> 

                            <div className="pt-1 border-t border-blue-600/30 space-y-1">
                                <div className="text-[9px] text-blue-200 font-medium">📊 Warga Lunas (Iuran)</div>
                                <div className="w-full bg-blue-950/40 rounded-full h-1 overflow-hidden">
                                    <div className="bg-gradient-to-r from-teal-400 to-emerald-400 h-1 rounded-full" style={{ width: `${duesProgress.percent}%` }}></div>
                                </div>
                                <div className="flex justify-between items-center text-[9px] text-blue-200 pt-0.5">
                                    <span>Sudah Lunas: <strong className="text-white">{duesProgress.paid}</strong> dari <strong className="text-white">{duesProgress.total} Warga</strong></span>
                                    <span className="font-mono font-bold text-emerald-300 bg-blue-950/50 px-1 rounded text-[8px]">{duesProgress.percent}%</span>
                                </div>
                            </div>
                        </div> 
                        
                        <div className="grid grid-cols-2 gap-1.5"> 
                            <div className="bg-white p-1.5 rounded-xl border border-green-100 shadow-sm">
                                <p className="text-[8px] text-green-600 font-bold uppercase tracking-wider">Pemasukan ({MONTH_NAMES[activeMonth].substring(0,3)})</p>
                                <p className="text-[11px] font-bold text-green-700 mt-0.5">{formatRupiah(financialData.income)}</p>
                            </div> 
                            <div className="bg-white p-1.5 rounded-xl border border-red-100 shadow-sm">
                                <p className="text-[8px] text-red-600 font-bold uppercase tracking-wider">Pengeluaran ({MONTH_NAMES[activeMonth].substring(0,3)})</p>
                                <p className="text-[11px] font-bold text-red-700 mt-0.5">{formatRupiah(financialData.expense)}</p>
                            </div> 
                        </div> 
                        
                        <div>
                            <div className="grid grid-cols-1 gap-1"> 
                                {Object.entries(CATEGORIES).map(([k, cat]) => ( 
                                    <div key={k} className={`p-1.5 rounded-lg border ${cat.color} flex flex-col justify-between`}>
                                        <p className="text-[9px] font-bold uppercase tracking-wide opacity-80">{cat.name}</p>
                                        <p className="text-xs font-bold mt-0.5">{formatRupiah(financialData.catBalances[k] || 0)}</p>
                                    </div> 
                                ))} 
                            </div> 
                        </div>

                        {/* TABEL TERMASUK NAMA INPUT KECIL DI BAWAHNYA */}
                        <div className="bg-white rounded-xl border shadow-sm overflow-hidden mt-1">
                            <div className="bg-gray-50 px-2.5 py-2 border-b flex justify-between items-center">
                                <h3 className="text-[10px] font-bold text-gray-700 uppercase">Riwayat Terakhir</h3>
                                <button onClick={() => setActiveTab('kas')} className="text-[9px] text-blue-600 font-bold hover:underline">Lihat Semua</button>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-white text-[8px] uppercase text-gray-400 border-b">
                                            <th className="px-2.5 py-1.5 font-bold">Tanggal</th>
                                            <th className="px-2.5 py-1.5 font-bold">Keterangan</th>
                                            <th className="px-2.5 py-1.5 font-bold text-right">Nominal</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {transactions.slice(0, 5).map(t => (
                                            <tr key={t.id} className="border-b last:border-b-0 hover:bg-gray-50">
                                                <td className="px-2.5 py-2 text-[9px] whitespace-nowrap text-gray-500">{t.date.split('T')[0]}</td>
                                                <td className="px-2.5 py-2 text-[9px] text-gray-800 max-w-[120px]">
                                                    <div className="truncate font-medium">{t.ket}</div>
                                                    {t.createdBy && <div className="text-[7px] text-gray-400 font-mono scale-95 origin-left">by: {t.createdBy}</div>}
                                                </td>
                                                <td className={`px-2.5 py-2 text-[9px] font-bold text-right whitespace-nowrap ${t.type === 'masuk' ? 'text-green-600' : 'text-red-600'}`}>
                                                    {t.type === 'masuk' ? '+' : '-'}{formatRupiah(t.nominal)}
                                                </td>
                                            </tr>
                                        ))}
                                        {transactions.length === 0 && (
                                            <tr>
                                                <td colSpan="3" className="px-2.5 py-4 text-center text-xs text-gray-400">Belum ada transaksi</td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                    </div> 
                )}

                {activeTab === 'warga' && ( 
                    <div className="flex flex-col space-y-2"> 
                        <div className="flex items-center gap-2 bg-white p-1 rounded-xl border shadow-sm"> 
                            <button onClick={() => { setActiveMonth(activeMonth === 0 ? 11 : activeMonth - 1); if(activeMonth === 0) setActiveYear(activeYear - 1); }} className="p-1 hover:bg-gray-100 rounded-lg text-xs font-bold">&lt;</button> 
                            <span className="font-bold text-xs flex-1 text-center text-gray-700">{MONTH_NAMES[activeMonth]} {activeYear}</span> 
                            <button onClick={() => { setActiveMonth(activeMonth === 11 ? 0 : activeMonth + 1); if(activeMonth === 11) setActiveYear(activeYear + 1); }} className="p-1 hover:bg-gray-100 rounded-lg text-xs font-bold">&gt;</button> 
                        </div> 
                        
                        {isAdmin && (
                            <button onClick={handleAddCitizen} className="w-full p-2 bg-blue-600 text-white rounded-xl font-bold text-xs shadow-sm hover:bg-blue-700">+ Tambah Warga Baru</button> 
                        )}
                        
                        <div className="flex gap-2">
                            <input 
                                type="text" 
                                placeholder="Cari nama/blok..." 
                                value={searchTerm} 
                                onChange={(e) => setSearchTerm(e.target.value)} 
                                className="flex-1 text-xs p-2 border rounded-xl shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500" 
                            />
                            <select 
                                value={filterStatus} 
                                onChange={(e) => setFilterStatus(e.target.value)} 
                                className="w-1/3 text-xs p-2 border rounded-xl shadow-sm bg-white text-gray-700 focus:outline-none focus:ring-1 focus:ring-blue-500"
                            >
                                <option value="all">Semua</option>
                                <option value="lunas">✅ Lunas</option>
                                <option value="belum">⏳ Belum</option>
                            </select>
                        </div>

                        <div className="space-y-1.5">
                            {filteredCitizens.length === 0 && (
                                <p className="text-center text-xs text-gray-400 pt-4">Data warga tidak ditemukan.</p>
                            )}
                            {filteredCitizens.map(c => {
                                const paidAmount = getDuesTotalPaid(c.id);
                                const isLunas = paidAmount >= 25000;

                                return ( 
                                <div key={c.id} className="bg-white p-2 rounded-xl border shadow-sm flex justify-between items-center"> 
                                    <div>
                                        <p className="font-bold text-xs text-gray-800">{c.name}</p>
                                        <div className="flex items-center gap-1.5 mt-0.5">
                                            <p className="text-[9px] font-mono text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded inline-block">{c.block}</p>
                                            {c.createdBy && <span className="text-[7px] text-gray-400 font-mono">by: {c.createdBy}</span>}
                                        </div>
                                    </div> 
                                    <div className="flex gap-1 items-center"> 
                                        {isAdmin && (
                                            <>
                                                <button onClick={() => handleEditCitizen(c)} className="text-blue-600 text-[10px] px-1 font-medium">Edit</button> 
                                                <button onClick={() => handleDeleteCitizen(c.id)} className="text-red-500 text-[10px] px-1 font-medium">Hapus</button> 
                                            </>
                                        )}
                                        
                                        {isLunas ? (
                                            <span className="text-[9px] bg-green-100 text-green-700 px-2 py-0.5 rounded font-bold ml-1 border border-green-200">
                                                Lunas {paidAmount === 25000 ? '(Keamanan)' : '(Semua)'}
                                            </span>
                                        ) : (
                                            <div className="flex items-center">
                                                {!isAdmin && <span className="text-[9px] bg-red-50 text-red-500 px-2 py-0.5 rounded font-bold ml-1 border border-red-100">Belum</span>}
                                                {isAdmin && (
                                                    <button onClick={() => {
                                                        setPayNominal(50000); 
                                                        setShowPayModal({ isOpen: true, citizen: c });
                                                    }} className="text-[9px] bg-blue-600 text-white px-2 py-0.5 rounded font-bold ml-1 shadow-sm">Bayar</button>
                                                )}
                                            </div>
                                        )} 
                                    </div> 
                                </div> 
                                )
                            })}
                        </div>
                    </div> 
                )}

                {activeTab === 'kas' && ( 
                    <div className="flex flex-col space-y-2"> 
                        {isAdmin && (
                            <div className="flex gap-2">
                                <button onClick={() => { setEditTransData(null); setShowTransModal(true); }} className="flex-1 bg-blue-800 text-white p-2 rounded-xl font-bold text-xs shadow-md hover:bg-blue-900">+ Transaksi Baru</button> 
                                
                                <button onClick={handleSyncToSheets} disabled={isSyncing} className={`flex-none px-3 bg-emerald-600 text-white rounded-xl font-bold text-xs shadow-md flex items-center justify-center gap-1 ${isSyncing ? 'opacity-50 cursor-not-allowed' : 'hover:bg-emerald-700'}`}>
                                    {isSyncing ? '🔄 Mengirim...' : '☁️ Kirim ke Sheets'}
                                </button> 
                            </div>
                        )}

                        <div className="flex flex-col gap-1.5 bg-white p-1.5 rounded-xl border shadow-sm">
                            <div className="grid grid-cols-2 gap-1.5">
                                <select value={filterTransMonth} onChange={(e) => setFilterTransMonth(e.target.value)} className="text-[10px] p-1 border rounded-lg bg-gray-50 truncate font-medium text-gray-700 focus:outline-none">
                                    <option value="all">📅 Semua Bulan</option>
                                    {MONTH_NAMES.map((name, idx) => <option key={idx} value={idx}>{name}</option>)}
                                </select>
                                <select value={filterTransYear} onChange={(e) => setFilterTransYear(e.target.value)} className="text-[10px] p-1 border rounded-lg bg-gray-50 truncate font-medium text-gray-700 focus:outline-none">
                                    <option value="all">🗓️ Semua Tahun</option>
                                    {AVAILABLE_YEARS.map(yr => <option key={yr} value={yr}>{yr}</option>)}
                                </select>
                            </div>
                            <div className="grid grid-cols-3 gap-1.5">
                                <select value={filterType} onChange={(e) => setFilterType(e.target.value)} className="text-[10px] p-1 border rounded-lg bg-gray-50 truncate font-medium text-gray-700 focus:outline-none">
                                    <option value="all">🔄 Tipe</option>
                                    <option value="masuk">➕ Masuk</option>
                                    <option value="keluar">➖ Keluar</option>
                                </select>
                                <select value={filterMethod} onChange={(e) => setFilterMethod(e.target.value)} className="text-[10px] p-1 border rounded-lg bg-gray-50 truncate font-medium text-gray-700 focus:outline-none">
                                    <option value="all">💳 Metode</option>
                                    <option value="tunai">💵 Tunai</option>
                                    <option value="qris">📱 QRIS</option>
                                </select>
                                <select value={filterCategory} onChange={(e) => setFilterCategory(e.target.value)} className="text-[10px] p-1 border rounded-lg bg-gray-50 truncate font-medium text-gray-700 focus:outline-none">
                                    <option value="all">📂 Kategori</option>
                                    {Object.entries(CATEGORIES).map(([k,v]) => <option key={k} value={k}>{v.name}</option>)}
                                </select>
                            </div>
                        </div>

                        <div className="bg-blue-50 p-2 rounded-xl border border-blue-100 shadow-sm flex justify-between items-center text-[10px]">
                            <span className="font-bold text-blue-800">{filteredTransactions.length} Transaksi</span>
                            <div className="flex gap-2">
                                <span className="text-green-600 font-bold">+{formatRupiah(filteredTransactions.filter(t => t.type === 'masuk').reduce((sum, t) => sum + (parseInt(t.nominal)||0), 0))}</span>
                                <span className="text-red-600 font-bold">-{formatRupiah(filteredTransactions.filter(t => t.type === 'keluar').reduce((sum, t) => sum + (parseInt(t.nominal)||0), 0))}</span>
                            </div>
                        </div>

                        <div className="space-y-1.5">
                            {filteredTransactions.map(t => ( 
                                <div key={t.id} className="bg-white p-2 rounded-xl border shadow-sm flex justify-between items-center"> 
                                    <div>
                                        <p className="font-bold text-xs text-gray-800">{t.ket}</p>
                                        <div className="flex items-center gap-1.5 mt-0.5">
                                            <p className="text-[9px] text-gray-400">{t.date.split('T')[0]}</p>
                                            <span className="text-[8px] font-mono px-1 bg-gray-100 text-gray-500 rounded">{t.method.toUpperCase()}</span>
                                            {t.createdBy && <span className="text-[8px] font-mono px-1 bg-blue-50 text-blue-500 rounded">by: {t.createdBy}</span>}
                                        </div>
                                    </div> 
                                    <div className="flex items-center gap-2"> 
                                        <p className={`font-bold text-xs ${t.type === 'masuk' ? 'text-green-600' : 'text-red-600'}`}>{t.type === 'masuk' ? '+' : '-'}{formatRupiah(t.nominal)}</p> 
                                        
                                        {isAdmin && (
                                            <div className="flex gap-1 border-l border-gray-200 pl-2 ml-1">
                                                <button onClick={() => { setEditTransData(t); setShowTransModal(true); }} className="text-blue-500 text-xs hover:text-blue-700" title="Edit">✎</button> 
                                                <button onClick={() => handleDeleteTransaction(t.id)} className="text-red-400 text-xs hover:text-red-600" title="Hapus">✕</button> 
                                            </div>
                                        )}
                                    </div> 
                                </div> 
                            ))}
                            {filteredTransactions.length === 0 && (
                                <p className="text-center text-xs text-gray-400 pt-4">Tidak ada riwayat transaksi</p>
                            )}
                        </div>
                    </div> 
                )} 
            </main>

            {/* NAVIGASI BAWAH */}
            <nav className="flex-none bg-white border-t border-gray-200 flex justify-around items-center p-2 pb-safe"> 
                <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center gap-1 w-20 py-1 transition-colors ${activeTab === 'home' ? 'text-blue-800' : 'text-gray-400 hover:text-gray-600'}`}>
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={activeTab === 'home' ? 2.5 : 2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    <span className={`text-[10px] ${activeTab === 'home' ? 'font-bold' : 'font-medium'}`}>Beranda</span>
                </button> 
                
                <button onClick={() => loop} onClick={() => setActiveTab('warga')} className={`flex flex-col items-center gap-1 w-20 py-1 transition-colors ${activeTab === 'warga' ? 'text-blue-800' : 'text-gray-400 hover:text-gray-600'}`}>
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={activeTab === 'warga' ? 2.5 : 2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <span className={`text-[10px] ${activeTab === 'warga' ? 'font-bold' : 'font-medium'}`}>Data Warga</span>
                </button> 
                
                <button onClick={() => setActiveTab('kas')} className={`flex flex-col items-center gap-1 w-20 py-1 transition-colors ${activeTab === 'kas' ? 'text-blue-800' : 'text-gray-400 hover:text-gray-600'}`}>
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={activeTab === 'kas' ? 2.5 : 2} d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                    <span className={`text-[10px] ${activeTab === 'kas' ? 'font-bold' : 'font-medium'}`}>Uang Kas</span>
                </button> 
            </nav> 

            {/* MODAL LOGIN ADMIN */}
            {showLoginModal && (
                <div className="fixed inset-0 bg-black/60 z-[70] flex items-center justify-center p-4 backdrop-blur-sm"> 
                    <div className="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl"> 
                        <h3 className="font-bold text-lg text-center text-gray-800 mb-1">Login Admin</h3>
                        <p className="text-center text-[10px] text-gray-500 mb-5">Masuk untuk menambah dan mengedit data</p>
                        
                        {loginError && <p className="text-xs text-red-500 bg-red-50 p-2 rounded mb-3 text-center border border-red-100">{loginError}</p>}
                        
                        <form onSubmit={handleLogin} className="space-y-3">
                            <div>
                                <label className="text-[10px] font-bold text-gray-600 ml-1">Username</label>
                                <input name="username" type="text" className="w-full mt-1 text-sm p-3 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition" required />
                            </div>
                            <div>
                                <label className="text-[10px] font-bold text-gray-600 ml-1">Password</label>
                                <input name="password" type="password" className="w-full mt-1 text-sm p-3 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition" required />
                            </div>
                            <div className="flex gap-2 pt-3">
                                <button type="button" onClick={() => { setShowLoginModal(false); setLoginError(''); }} className="flex-1 border border-gray-300 text-gray-600 p-3 rounded-xl text-xs font-bold hover:bg-gray-100 transition">Batal</button> 
                                <button type="submit" className="flex-1 bg-blue-600 text-white p-3 rounded-xl text-xs font-bold hover:bg-blue-700 shadow-md transition">Login</button> 
                            </div>
                        </form>
                    </div> 
                </div> 
            )}

            {/* MODAL BAYAR */}
            {showPayModal.isOpen && isAdmin && (() => {
                const c = showPayModal.citizen;
                return (
                    <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4 backdrop-blur-sm"> 
                        <div className="bg-white p-5 rounded-2xl w-full max-w-sm shadow-2xl"> 
                            <h3 className="font-bold text-sm mb-1 text-center text-gray-800">Pembayaran Iuran</h3>
                            <p className="text-center font-bold text-blue-600 text-xs mb-4">{c.name}</p>

                            <div className="mb-4">
                                <p className="text-[10px] font-bold mb-2 text-gray-600">Pilih Paket Iuran:</p>
                                <div className="flex gap-2">
                                    <button 
                                        onClick={() => setPayNominal(25000)} 
                                        className={`flex-1 p-2 rounded-lg text-[10px] font-bold border transition ${payNominal === 25000 ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-50'}`}>
                                        Rp 25.000<br/><span className="font-normal opacity-80">(Keamanan Saja)</span>
                                    </button>
                                    
                                    <button 
                                        onClick={() => setPayNominal(50000)} 
                                        className={`flex-1 p-2 rounded-lg text-[10px] font-bold border transition ${payNominal === 50000 ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-50'}`}>
                                        Rp 50.000<br/><span className="font-normal opacity-80">(Keamanan+Sampah)</span>
                                    </button>
                                </div>
                            </div>

                            <div className="mb-2">
                                <p className="text-[10px] font-bold mb-2 text-gray-600">Pilih Metode Pembayaran:</p>
                                <div className="grid grid-cols-2 gap-3"> 
                                    <button onClick={() => handlePayDues('tunai', payNominal)} className="p-4 bg-orange-100 hover:bg-orange-200 text-orange-800 rounded-xl font-bold text-sm transition shadow-sm">Tunai</button> 
                                    <button onClick={() => handlePayDues('qris', payNominal)} className="p-4 bg-blue-100 hover:bg-blue-200 text-blue-800 rounded-xl font-bold text-sm transition shadow-sm">QRIS</button> 
                                </div> 
                            </div>

                            <button onClick={() => { setShowPayModal({ isOpen: false, citizen: null }); setPayNominal(50000); }} className="w-full mt-4 text-gray-400 text-xs hover:text-gray-600 font-medium p-2">Batal</button> 
                        </div> 
                    </div> 
                );
            })()}

            {/* MODAL TRANSAKSI */}
            {showTransModal && isAdmin && ( 
                <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4 backdrop-blur-sm"> 
                    <form key={editTransData ? editTransData.id : 'new'} onSubmit={handleSaveTransaction} className="bg-white p-5 rounded-2xl w-full max-w-sm space-y-3 shadow-2xl"> 
                        <h3 className="font-bold text-sm text-gray-800 mb-2">{editTransData ? 'Edit Transaksi' : 'Transaksi Baru'}</h3> 
                        
                        <input name="ket" defaultValue={editTransData?.ket || ''} placeholder="Keterangan" className="w-full text-xs p-2.5 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition" required /> 
                        <input name="nom" type="number" defaultValue={editTransData?.nominal || ''} placeholder="Nominal" className="w-full text-xs p-2.5 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition" required /> 
                        <input name="date" type="date" defaultValue={editTransData ? editTransData.date.split('T')[0] : localToday} className="w-full text-xs p-2.5 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition" required />
                        
                        <div className="grid grid-cols-2 gap-2">
                            <select name="type" defaultValue={editTransData?.type || 'masuk'} className="w-full text-xs p-2.5 border border-gray-300 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="masuk">Pemasukan</option>
                                <option value="keluar">Pengeluaran</option>
                            </select> 
                            <select name="method" defaultValue={editTransData?.method || 'tunai'} className="w-full text-xs p-2.5 border border-gray-300 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="tunai">Tunai</option>
                                <option value="qris">QRIS</option>
                            </select> 
                        </div>
                        <select name="cat" defaultValue={editTransData?.category || 'kas_rt'} className="w-full text-xs p-2.5 border border-gray-300 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            {Object.entries(CATEGORIES).map(([k,v]) => <option key={k} value={k}>{v.name}</option>)}
                        </select> 
                        
                        <div className="flex gap-2 pt-2">
                            <button type="button" onClick={() => { setShowTransModal(false); setEditTransData(null); }} className="flex-1 border border-gray-300 text-gray-500 p-2.5 rounded-xl text-xs hover:bg-gray-100 font-medium transition">Batal</button> 
                            <button type="submit" className="flex-1 bg-blue-800 text-white p-2.5 rounded-xl text-xs font-bold hover:bg-blue-900 shadow-md transition">Simpan</button> 
                        </div>
                    </form> 
                </div> 
            )}
        </div> 
    ); 
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script> 
</body>
</html>
